name: Build and Release

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Select project to build'
        required: true
        default: 'both'
        type: choice
        options:
          - go-crypt
          - rust-crypt
          - both

jobs:
  build-go:
    name: Build Go Crypt
    if: ${{ github.event.inputs.project == 'go-crypt' || github.event.inputs.project == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: go-crypt/go.sum
      - name: Build
        run: |
          cd go-crypt
          if [ ! -f go.mod ]; then go mod init go-crypt; fi
          go mod tidy
          CGO_ENABLED=0 go build -ldflags="-s -w" -o go-crypt-linux-amd64 main.go
      - uses: actions/upload-artifact@v4
        with:
          name: go-crypt-linux-amd64
          path: go-crypt/go-crypt-linux-amd64

  build-rust:
    name: Build Rust Crypt
    if: ${{ github.event.inputs.project == 'rust-crypt' || github.event.inputs.project == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-crypt -> target
      
      - name: Build
        # Running cargo directly inside the project directory
        working-directory: ./rust-crypt
        run: |
          cargo build --release
          cp target/release/rust-crypt ../rust-crypt-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: rust-crypt-linux-amd64
          path: rust-crypt-linux-amd64