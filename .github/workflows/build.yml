name: Build and Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Select Target Platform'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - LINUX
          - MACOS
          - WINDOWS
      version:
        description: 'Build Version'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: linux
            arch: amd64
            platform: LINUX
          - os: linux
            arch: arm64
            platform: LINUX
          # macOS
          - os: darwin
            arch: amd64
            platform: MACOS
          - os: darwin
            arch: arm64
            platform: MACOS
          # Windows
          - os: windows
            arch: amd64
            platform: WINDOWS
          - os: windows
            arch: "386"
            platform: WINDOWS

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # This step checks if the current matrix row matches the user selection
      - name: Should Run Check
        id: check
        run: |
          if [[ "${{ github.event.inputs.platform }}" == "ALL" || "${{ github.event.inputs.platform }}" == "${{ matrix.platform }}" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Binary
        if: steps.check.outputs.run == 'true'
        run: |
          if [ ! -f go.mod ]; then
            go mod init file-crypt
            go get golang.org/x/crypto/pbkdf2
          fi
          go mod tidy
          
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          OUTPUT_NAME="file-crypt-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build -ldflags="-s -w" -o $OUTPUT_NAME main.go

      - name: Upload Artifact
        if: steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: file-crypt-${{ matrix.os }}-${{ matrix.arch }}
          path: file-crypt-${{ matrix.os }}-${{ matrix.arch }}*