name: Build and Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Select Target Platform'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - LINUX
          - MACOS
          - WINDOWS
      version:
        description: 'Build Version'
        required: true
        default: 'v1.0.0'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          JSON='{
            "include": [
              {"os": "linux", "arch": "amd64", "platform": "LINUX"},
              {"os": "linux", "arch": "arm64", "platform": "LINUX"},
              {"os": "darwin", "arch": "amd64", "platform": "MACOS"},
              {"os": "darwin", "arch": "arm64", "platform": "MACOS"},
              {"os": "windows", "arch": "amd64", "platform": "WINDOWS"},
              {"os": "windows", "arch": "386", "platform": "WINDOWS"}
            ]
          }'
          
          CHOICE="${{ github.event.inputs.platform }}"
          if [ "$CHOICE" == "ALL" ]; then
            RESULT=$JSON
          else
            RESULT=$(echo $JSON | jq -c "{include: [.include[] | select(.platform == \"$CHOICE\")]}")
          fi
          
          echo "matrix=$RESULT" >> $GITHUB_OUTPUT

  build:
    needs: setup
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Binary
        run: |
          if [ ! -f go.mod ]; then
            go mod init file-crypt
            go get golang.org/x/crypto/pbkdf2
          fi
          go mod tidy
          
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          OUTPUT_NAME="file-crypt-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build -ldflags="-s -w" -o $OUTPUT_NAME main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-crypt-${{ matrix.os }}-${{ matrix.arch }}
          path: file-crypt-${{ matrix.os }}-${{ matrix.arch }}*